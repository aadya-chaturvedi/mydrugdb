<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Drugs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="mb-4">💊 Drug Database</h1>

    <div class="mb-3">
        <a th:href="@{/drugs/new}" class="btn btn-success">+ Add New Drug</a>
    </div>

    <!-- Search -->
    <form th:action="@{/drugs}" method="get" class="row g-2 mb-4">
        <div class="col-auto">
            <input type="text" name="keyword" th:value="${keyword}"
                   class="form-control" placeholder="Search drug name...">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/drugs}" class="btn btn-secondary">Clear</a>
        </div>
    </form>

    <!-- No data message -->
    <div th:if="${#lists.isEmpty(drugs)}" class="alert alert-warning">
        No drugs found.
    </div>

    <!-- Table -->
    <table class="table table-striped table-bordered" th:if="${not #lists.isEmpty(drugs)}">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Manufacturer</th>
            <th>Usage</th>
            <th>Side Effects</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="drug : ${drugs}">
            <td th:text="${drug.id}"></td>
            <td th:text="${drug.name}"></td>
            <td th:text="${drug.manufacturer}"></td>
            <td th:text="${drug.usage}"></td>
            <td th:text="${drug.sideEffects}"></td>
            <td>
                <a th:href="@{/drugs/edit/{id}(id=${drug.id})}" class="btn btn-primary btn-sm">Edit</a>
                <a th:href="@{/drugs/delete/{id}(id=${drug.id})}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this drug?')">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/}" class="btn btn-link">← Back to Home</a>

</div>

</body>
</html>
