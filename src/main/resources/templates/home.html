<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MyDrugDB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 text-center" style="max-width: 600px;">

    <div class="card shadow-sm p-4">
        <h1 class="mb-3">💊 MyDrugDB</h1>

        <p class="text-muted mb-4">
            Search for a drug or browse the full database
        </p>

        <!-- 🔍 Search Form -->
        <form th:action="@{/drugs}" method="get" class="mb-4">
            <div class="input-group">
                <input type="text" name="keyword" class="form-control"
                       placeholder="Search for a drug...">
                <button class="btn btn-primary" type="submit">Search</button>
            </div>
        </form>

        <!-- 📋 View All -->
        <a th:href="@{/drugs}" class="btn btn-outline-secondary w-100 mb-2">
            View All Drugs
        </a>

<!--        &lt;!&ndash; ➕ Add New &ndash;&gt;-->
<!--        <a th:href="@{/drugs/new}" class="btn btn-success w-100">-->
<!--            + Add New Drug-->
<!--        </a>-->

    </div>

</div>

</body>
</html>
